var markers = [];

function addBuilding(data){

var marker=L.marker(data.coords,{icon:buildingIcon});

var gallery = `
<div class="slider">
<button class="prev" onclick="prevPhoto(this)">‹</button>
<img src="${data.photos[0]}">
<button class="next" onclick="nextPhoto(this)">›</button>
</div>
`;

var popup=`

<div class="popup-card">

<h2>${data.name}</h2>

<div class="gallery">
${gallery}
</div>

<p>${data.text}</p>

<a class="link" href="${data.link}" target="_blank">
Подробнее →
</a>

</div>

`;

marker.bindPopup(popup);

marker.on('popupopen', function(e){

var slider = e.popup._contentNode.querySelector(".slider");

if(slider){
slider.photos = data.photos;
slider.index = 0;
}

});

marker.period=data.period;

marker.addTo(map);

markers.push(marker);

}



function filterPeriod(period){

markers.forEach(m=>{
map.removeLayer(m)
})

markers.forEach(m=>{
if(period==="all" || m.period===period){
m.addTo(map)
}
})

}

function nextPhoto(btn){

var slider = btn.parentElement;
var img = slider.querySelector("img");

var photos = slider.photos;
var index = slider.index || 0;

index++;

if(index >= photos.length){
index = 0;
}

img.src = photos[index];
slider.index = index;

}

function prevPhoto(btn){

var slider = btn.parentElement;
var img = slider.querySelector("img");

var photos = slider.photos;
var index = slider.index || 0;

index--;

if(index < 0){
index = photos.length-1;
}

img.src = photos[index];
slider.index = index;

}
